<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nueva Contraseña - MiNegocio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 font-sans h-screen flex flex-col justify-center py-12 sm:px-6 lg:px-8">
    <div class="sm:mx-auto sm:w-full sm:max-w-md">
        <div class="flex justify-center text-primary-600">
            <i class="fa-solid fa-shield-halved text-5xl"></i>
        </div>
        <h2 class="mt-6 text-center text-3xl font-extrabold text-gray-900">Crear nueva contraseña</h2>
    </div>

    <div class="mt-8 sm:mx-auto sm:w-full sm:max-w-md">
        <div class="bg-white py-8 px-4 shadow sm:rounded-lg sm:px-10 border border-gray-100">
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="rounded-md {{ 'bg-red-50 text-red-700' if category == 'danger' else 'bg-green-50 text-green-700' }} p-4 mb-6">
                            <p class="text-sm font-medium">{{ message }}</p>
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form class="space-y-6" action="{{ url_for('reset_password', token=token) }}" method="POST">
                <div>
                    <label for="new_password" class="block text-sm font-medium text-gray-700">Nueva contraseña</label>
                    <input id="new_password" name="new_password" type="password" minlength="6" required class="mt-1 w-full border border-gray-300 rounded-md px-3 py-2">
                </div>
                <div>
                    <label for="confirm_password" class="block text-sm font-medium text-gray-700">Confirmar contraseña</label>
                    <input id="confirm_password" name="confirm_password" type="password" minlength="6" required class="mt-1 w-full border border-gray-300 rounded-md px-3 py-2">
                </div>
                <button type="submit" class="w-full py-2 px-4 rounded-md text-white bg-blue-600 hover:bg-blue-700">
                    Guardar nueva contraseña
                </button>
            </form>
        </div>
    </div>
</body>
</html>
